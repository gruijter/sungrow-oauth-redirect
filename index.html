<!DOCTYPE html>
<html>
<head>
  <title>Sungrow Homey Redirector</title>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');

    if (code) {
      // Phase 2: Callback van iSolarCloud -> Doorsturen naar Athom
      const athomUrl = 'https://callback.athom.com/oauth2/callback/?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
      window.location.href = athomUrl;
    } else {
      // Phase 1: Request van Athom -> Richting iSolarCloud met state in het fragment
      const authHost = urlParams.get('authHost') || 'web3.isolarcloud.eu';
      const cloudId = urlParams.get('cloudId');
      const applicationId = urlParams.get('applicationId');
      const clientId = urlParams.get('client_id');
      const responseType = urlParams.get('response_type');
      const redirectUri = urlParams.get('redirect_uri');

      // Bouw fragment parameters op
      const fragmentParams = new URLSearchParams();
      fragmentParams.set('cloudId', cloudId);
      fragmentParams.set('applicationId', applicationId);
      fragmentParams.set('redirectUrl', window.location.origin + window.location.pathname);
      fragmentParams.set('state', state);
      fragmentParams.set('client_id', clientId);
      fragmentParams.set('response_type', responseType);
      fragmentParams.set('redirect_uri', window.location.origin + window.location.pathname);

      const isolarUrl = 'https://' + authHost + '/#/authorized-app?' + fragmentParams.toString();
      window.location.href = isolarUrl;
    }
  </script>
</body>
</html>
